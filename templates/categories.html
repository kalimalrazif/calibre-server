{% extends "base.html" %}

{% block title %}{{ title }} - Calibre Library{% endblock %}

{% block content %}
<h2>{{ title }}</h2>

<div class="grid" style="margin-top: 20px;">
    {% for category in categories %}
    <div class="card">
        <h3><a href="{{ base_path }}/{{ category.id }}">{{ category.name }}</a></h3>
        <p class="count">{{ category.count }} books</p>
    </div>
    {% endfor %}
</div>
{% endblock %}
